# Note you may need to add the following to your printer.cfg somewhere (without the comments of course) for the Kinematic position stuff below to work.
#[force_move]
#enable_force_move: True

[gcode_macro _HOME_X]
gcode:
    # Home
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.5%}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}
    
    SET_KINEMATIC_POSITION X=15
    G91
    G1 X-10 F1200
    
    G4 P1000
    M400 
    G28 X
    
    # Move away
    G91
    G1 X-10 F1200
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Y]
gcode:
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.5 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}
    
    SET_KINEMATIC_POSITION Y=15
    G91
    G1 Y-10 F1200
    
    G4 P1000
    M400 
    
    # Home
    G28 Y
    # Move away
    G91
    G1 Y-10 F1200

    # Wait just a second… (give StallGuard registers time to clear)
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro CHOME]
description: Homes XYZ axis only if printer is in a non-homed state
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

[gcode_macro CENTER]
description: Moves the toolhead to the center
gcode:
  CHOME
  {% set x_center = printer.toolhead.axis_maximum.x|float / 2.0 %}
  {% set y_center = printer.toolhead.axis_maximum.y|float / 2.0 %}
  G90
  G1 Z5 F600
  G1 X{x_center} Y{y_center} F7800

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
    {% set OLD_TARGET = printer.extruder.target %}   # <--- Capture the current target temp
    {% set PROBE_TEMP = 150 %}                       # Define probe temp at the top

    SAVE_GCODE_STATE NAME=STATE_HOME_OVERRIDE

    # --- START LED ANIMATION ---
    SET_LED_EFFECT EFFECT=toolhead_homing_mesh
    
    # --- START CONCURRENT HEATING/COOLING ---
    {% if home_all or 'Z' in params %}
        # Only change temp if we are outside the 150C window
        {% if printer.extruder.temperature < (PROBE_TEMP - 2) or printer.extruder.temperature > (PROBE_TEMP + 2) %}
            M104 S{PROBE_TEMP}                       # Non-blocking heat/cool
        {% endif %}
    {% endif %}

    # 1. Drop the bed slightly before moving X/Y so the nozzle doesn't scrape
    G90
    G0 Z5 F600

    # 2. Home X and Y first
    {% if home_all or 'X' in params %}
        _HOME_X
    {% endif %}

    {% if home_all or 'Y' in params %}
        _HOME_Y
    {% endif %}
    
    # 3. Move to a random spot on the bed, THEN home Z
    {% if home_all or 'Z' in params %}
        {% set RANDOM_X = (range(20, 100) | random) %}
        {% set RANDOM_Y = (range(20, 100) | random) %}
        
        G90
        G0 X{RANDOM_X} Y{RANDOM_Y} F7200      # Move to random bed location
        
        # --- WAIT FOR TEMPERATURE ---
        {% if printer.extruder.temperature < (PROBE_TEMP - 2) or printer.extruder.temperature > (PROBE_TEMP + 2) %}
            M117 Wait Z Home Temp...
            M118 Wait Z Home Temp...
            M109 S{PROBE_TEMP}       # Blocking wait until 150C is reached
        {% endif %}

        G28 Z               # Tap the bed with the PZ probe
        G0 Z5 F600          # Back off 10mm after homing
        
        # --- Restore Temperature ---
        M104 S{OLD_TARGET}   # Restore the captured target temp
        M117                 # Clear screen
    {% endif %}

    # --- STOP LED ANIMATION & RESTORE SOLID WHITE ---
    STOP_LED_EFFECTS
    SET_LED LED=toolhead RED=1.0 GREEN=1.0 BLUE=1.0
    
    RESTORE_GCODE_STATE NAME=STATE_HOME_OVERRIDE