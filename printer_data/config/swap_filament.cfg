[gcode_macro M600]
description: Initiates a color swap
gcode:
    # 1. This instantly halts the print and saves the exact X/Y/Z coordinates
    PAUSE 
    
    # 2. Then, you can call your unload sequence to back the filament out
    SWAP_FILAMENT_OUT

[gcode_macro SWAP_FILAMENT_OUT]
description: Swaps filament out during a print with smart tip shaping
gcode:
    # Read the current hotend temperature
    {% set TEMP = printer.extruder.temperature %}

    G90                          ; set absolute positioning
    G1 Z10 F3000                 ; lift Z to clear the part safely
    G1 X5 Y5 F5000.0             ; move to front left corner
    G1 Z0.8 F3000                ; drop down to purge height
    
    M83                          ; set extruder to relative mode
    
    # --- Smart Tip Shaping Logic ---
    {% if TEMP > 235 %}
        # --- High-Temp Sequence (ASA / ABS) ---
        G1 E2.0 F1200            ; ram in
        G1 E-2.0 F1200           ; pull out
        G1 E2.0 F1200            ; ram in
        G1 E-2.0 F1200           ; pull out
        G1 E-5.0 F1800           ; quick retract to break string
        G4 P200                  ; pause to freeze
        G1 E-80.0 F300           ; extract the remaining 80mm
        
    {% else %}
        # --- Low-Temp Sequence (PLA / PETG) ---
        G1 E2.0 F300             ; slow ram to completely fill the nozzle
        G1 E-15.0 F3000          ; fast snap-break (Crucial for PLA strings)
        
        # Wiping inside the cold heatbreak
        G1 E2.0 F2000            ; push forward to iron the tail
        G1 E-2.0 F2000           ; pull back
        G1 E2.0 F2000            ; push forward
        G1 E-15.0 F2000          ; pull completely up into the cold heatbreak
        
        G4 P200                  ; pause to let the tip freeze
        G1 E-59.0 F300           ; extract the remaining 59mm
    {% endif %}

    M400                         ; wait for moves to finish

[gcode_macro SWAP_FILAMENT_IN]
description: Swaps filament in during a print
gcode:
    G90                          ; set absolute positioning
    G1 Z10 F3000                 ; lift Z to clear the part safely
    G1 X5 Y5 F5000.0             ; move to front left corner
    G1 Z0.8 F3000                ; drop down to purge height
    M83                          ; set extruder to relative mode
    G1 E40 F1200
    G1 X115 Y5 Z0.8 F250 E100    ; draw the purge line across the front edge
    G1 E-1 F3600                 ; retract 2mm quickly to prevent stringing on travel
    # G1 X60 Y5 Z5 F10000        ; fast move up and towards center to break the string
    # M400                       ; wait for moves to finish
    RESUME                       ; automatically returns to the saved XYZ and continues