[pwm_cycle_time beeper]
pin: gpio17
value: 0
shutdown_value: 0
cycle_time: 0.001

[gcode_macro M300]
description: Play a tone. Usage: M300 S[frequency] P[duration_ms]
gcode:
    # Set default frequency to 1000Hz if S is omitted
    {% set S = params.S|default(1000)|float %}
    # Set default duration to 100ms if P is omitted
    {% set P = params.P|default(100)|int %}

    {% if S > 0 %}
        # Klipper cycle_time is 1 / frequency in seconds
        SET_PIN PIN=beeper VALUE=0.5 CYCLE_TIME={ 1.0 / S }
        G4 P{P}
        SET_PIN PIN=beeper VALUE=0
    {% else %}
        # If frequency is 0, just pause (rest)
        G4 P{P}
    {% endif %}

