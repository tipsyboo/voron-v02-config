#####################################################################
# Macros
#####################################################################

# Orca Slicer:
# PRINT_START EXTRUDER=[nozzle_temperature_initial_layer] BED=[bed_temperature_initial_layer_single] CHAMBER=[chamber_temperature]

[gcode_macro _INITIALIZE_MACRO_VARS]
variable_caselight_on: True
gcode:

[delayed_gcode turn_off_fan]
gcode:
    M107

[gcode_macro TOGGLE_CASELIGHT]
description: Toggles the caselight LED on/off
gcode:
    {% if printer["gcode_macro _INITIALIZE_MACRO_VARS"].caselight_on %}
        # The caselight is currently ON (variable_caselight_on is True), so turn it OFF
        SET_LED LED=caselight WHITE=0
        SET_GCODE_VARIABLE MACRO=_INITIALIZE_MACRO_VARS VARIABLE=caselight_on VALUE=False
    {% else %}
        # The caselight is currently OFF (variable_caselight_on is False), so turn it ON
        SET_LED LED=caselight WHITE=0.1
        SET_GCODE_VARIABLE MACRO=_INITIALIZE_MACRO_VARS VARIABLE=caselight_on VALUE=True
    {% endif %}

[gcode_macro M191]
gcode:
    {% set s = params.S|default(60)|float %}
    {% if s == 0 %}
        # If target temperature is 0, do nothing
        # M117 No Chamber Heat
        SET_FAN_SPEED FAN=bed_fan SPEED=0.0
    {% else %}
        M117 Chamber -> {s|int}
        M118 Chamber -> {s|int}

        M104 S0                   ; Turn off nozzle
        M140 S110                 ; Crank the bed to 110C to act as a radiator
        M106 S255                 ; Turn on part cooling fan to 100% to circulate air
        SET_FAN_SPEED FAN=bed_fan SPEED=1.0
        
        CHOME
        CENTER
        G1 Z5 F3000
        
        # Wait for the chamber thermistor to reach the target
        TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={s} MAXIMUM={80}
        
        M106 S0                   ; Turn the fan back off so it doesn't ruin your first layer!
        SET_FAN_SPEED FAN=bed_fan SPEED=0.5
        M117 Chamber = {s|int}
        M118 Chamber = {s|int}
        G28
    {% endif %}

[gcode_macro PRINT_START]
gcode:
    # 1. Catch the variables from your Slicer
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|default("0")|int %}

    # 2. Preheat bed and nozzle for probing
    # The bed must fully heat for thermal expansion. Nozzle stays at 150C to prevent oozing while tapping.
    M190 S{target_bed}         ; Start heating bed and then continue
    M104 S150      ; Start heating nozzle to 150C (Non-blocking)
    G28 X Y        ; Home X and Y axes while the nozzle heats
    M109 S150      ; Wait for nozzle to actually reach 150C before proceeding
    G28 Z          ; Home Z-axis (Nozzle is now warm for accurate probing)

    # Preheat chamber
    M191 S{target_chamber}
    
    # 4. Clear any old meshes and run Klipper's native adaptive mesh
    M109 S150
    WIPER_CLEAN_NOZZLE
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1

    M109 S{target_extruder}
    WIPER_CLEAN_NOZZLE

    # 5. Park near the print to catch ooze during final heating
    # (SMART_PARK is a KAMP command that parks exactly where the purge will start)
    SMART_PARK

    # 6. Heat nozzle to final print temperature
    M190 S{target_bed}                    ; Set bed to actual print target and wait (drops down from 110C if needed)
    M109 S{target_extruder}    ; wait for extruder temp to reach final target

    # 7. KAMP Adaptive Purge
    LINE_PURGE
   
[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customize for your slicer of choice
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-3.0 F3600                 ; retract filament
    G91                            ; relative positioning

    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    #   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600             ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000  ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=bed_fan SPEED=0.0
    # M107                           ; turn off fan
    M106 S255                        ; blast part cooling fan to cool nozzle
    UPDATE_DELAYED_GCODE ID=turn_off_fan DURATION=100 ; schedule fan shutoff
    G90                            ; absolute positioning
    # G0 X60 Y{max_y-10} F3600       ; park nozzle at rear
    G0 Z{max_z-10} F3000           ; drop bed down to 10mm above the physical bottom
