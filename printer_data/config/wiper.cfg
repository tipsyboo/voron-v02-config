###############################################################################
## NOZZLE WIPER v2 - A nozzle purge bucket and brush for the Voron 0.1
##
## Configuration:
##
## 1.  Set the correct PWM pin that you connected the Orange wire
##     to in the [servo wipeServo] section replacing XXNN
## 2.  Home X, Y and Z axes
## 3.  Lower Z by at least 50mm
## 4.  Run the WIPER_DEPLOY macro and ensure the servo extends the arm 90 degrees
## 5.  Use the printer controls to move the nozzle so that it is in the centre
##     of the purge bucket on the X and Y axis
## 7.  Run M114 to get the nozzle position and set variable_x and variable_y.
##     If you do not set these values the macro will fail as the defaults are
##     deliberately wrong
## 8.  Move the nozzle into the center of the brush and raise the Nozzle Wiper
##     on the frame mount until the nozzle just rests into the brush. Try not
##     to let the brush touch the sock or it could wear it out prematurely.
##     Secure the position by tightening the 2 M3x8mm screws on the frame mount
## 9.  Move the nozzle out of the way from the brush and purge bucket
## 10. Run WIPER_RETRACT and ensure the servo moves the arm back away to the side
##
## Testing:
##
## 1.  Heat the nozzle to the printing temperature of the loaded filament
## 2.  Home all axes
## 3.  Be prepared to hit the Emergency Stop button if things don't go as they
##     should
## 4.  Run WIPER_CLEAN_NOZZLE
##
## That should be all changes needed. Call the WIPER_CLEAN_NOZZLE macro from
## the end of your START_PRINT macro to wipe the nozzle clean before printing
###############################################################################

[servo wipeServo]
pin: gpio29
minimum_pulse_width: 0.0005
maximum_servo_angle: 180

[gcode_macro WIPER_CLEAN_NOZZLE]
gcode:
   # {% if "xyz" in printer.toolhead.homed_axes %}
      SAVE_GCODE_STATE NAME=WIPER_CLEAN_NOZZLE
      CHOME
      G90
      _WIPER_DEPLOY
      # WIPER_PURGE
      _WIPER_WIPE
      _WIPER_RETRACT
      RESTORE_GCODE_STATE NAME=WIPER_CLEAN_NOZZLE
   # {% else %}
   #    { action_raise_error("Home All Axis First") }
   #    M117 Home All Axis First
   # {% endif %}

[gcode_macro _WIPER_BUCKET_POS]
# Sensible values for variable_x would be 32, but adjust as per the instructions
variable_x: 4
# Sensible values for variable_y would be around 60, but adjust as per the instructions
variable_y: 115
# Sensible value for variable_z is 50
variable_z: 15
gcode:
  M118 bucket pos X:{printer["gcode_macro _WIPER_BUCKET_POS"].x} Y:{printer["gcode_macro _WIPER_BUCKET_POS"].y} Z:{printer["gcode_macro _WIPER_BUCKET_POS"].z}

[gcode_macro _WIPER_DEPLOY]
gcode:
    G90
    G0 Z{printer["gcode_macro _WIPER_BUCKET_POS"].z}
    SET_SERVO SERVO=wipeServo ANGLE=121
    G4 P500
    
[gcode_macro _WIPER_RETRACT]
gcode:
    SET_SERVO SERVO=wipeServo ANGLE=4
    G4 P500
    SET_SERVO SERVO=wipeServo WIDTH=0 # OFF
    G4 P500

[gcode_macro _WIPER_WIPE]
gcode:
    # Set variables for cleaner G-code reading
    {% set pos_x = printer["gcode_macro _WIPER_BUCKET_POS"].x %}
    {% set pos_y = printer["gcode_macro _WIPER_BUCKET_POS"].y %}
    {% set pos_z = printer["gcode_macro _WIPER_BUCKET_POS"].z %}

    G90
    # Move to wiping height
    G0 Z{pos_z} F5000
    # Move to the exact center of the brush
    G0 X{pos_x} Y{pos_y} F10000

    # --- Stage 1: Side-to-Side Wiping (X-axis) ---
    {% for wipes in range(1, 4) %}
        G0 X{pos_x - 2.5} F1000
        G0 X{pos_x + 2.5} F1000
    {% endfor %}
    
    # --- Stage 2: Diagonal Wiping (Hourglass Pattern) ---
    # Move to Top-Left corner of the brush to begin
    G0 X{pos_x - 2.5} Y{pos_y + 3} F1000 
    {% for wipes in range(1, 4) %}
        # Diagonal wipe to Bottom-Right
        G0 X{pos_x + 2.5} Y{pos_y - 5} F1000
        # Sweep along the bottom edge to Bottom-Left
        G0 X{pos_x - 2.5} Y{pos_y - 5} F1000
        # Diagonal wipe up to Top-Right
        G0 X{pos_x + 2.5} Y{pos_y + 3} F1000
        # Sweep along the top edge back to Top-Left
        G0 X{pos_x - 2.5} Y{pos_y + 3} F1000
    {% endfor %}

    # Return nozzle to the X center before starting the Y moves
    G0 X{pos_x} F1000

    # --- Stage 3: Back-and-Forth Wiping (Y-axis) ---
    {% for wipes in range(1, 5) %}
        G0 Y{pos_y - 5} F1000
        G0 Y{pos_y + 3} F1000
    {% endfor %}
    
    CENTER

[gcode_macro _WIPER_PURGE]
gcode:
    G90
    G0 Z{printer["gcode_macro _WIPER_BUCKET_POS"].z} F5000
    G0 Y{printer["gcode_macro _WIPER_BUCKET_POS"].y+40} F5000
    G0 X{printer["gcode_macro _WIPER_BUCKET_POS"].x}
    G0 Y{printer["gcode_macro _WIPER_BUCKET_POS"].y} F5000
    {% if printer.extruder.temperature >= 180 %}
       M83
       G1 E10 F150
       G1 E-2 F{150 * 750}
       G4 P{2000}
       G92 E0
    {% else %}
      { action_raise_error("Nozzle Temp must be > 180C") }
    {% endif %}