[gcode_macro LOAD_FILAMENT]
description: Loads new filament into toolhead
gcode:
  {% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
  M104 S150                  ; Start heating nozzle to 150C
  CHOME
  G90                         ; absolute positioning
  M109 S{EXTRUDER_TEMP}       ; heat up the hotend
  M83                         ; set extruder to relative mode
  M104 S{EXTRUDER_TEMP}       ; Start heating nozzle to 150C
  G1 X5 Y65 Z0.8 F5000.0 E5
  G1 X115 Y65 Z0.8 F250 E110
  G1 E-3 F3600
  G1 X80 Y60 Z20 F10000
  M400                        ; wait for moves to finish
  G1 E-6.0 F3600              ; retract filament
  M104 S0                     ; cool down the hotend
  M106 S255                   ; turn on part cooling fans to 100%
  G4 P30000                   ; wait for 30 seconds
  M107                        ; turn the fans back off
  # CENTER

[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from toolhead
gcode:
  {% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
  M104 S150                  ; Start heating nozzle to 150C
  # CHOME
  M104 S{EXTRUDER_TEMP}       ; heat up the hotend and continue
  G90                         ; absolute positioning
  M109 S{EXTRUDER_TEMP}       ; heat up the hotend
  M83                         ; set extruder to relative mode
  G1 E-5 F1800                ; quickly retract a small amount to elimate stringing
  G4 P200                     ; pause for a short amount of time
  G1 E-80 F300               ; retract slowly the rest of the way
  M400                        ; wait for moves to finish
  M104 S0                     ; cool down the hotend
  # CENTER

[gcode_macro M600]
description: Initiates a color swap
gcode:
    # 1. This instantly halts the print and saves the exact X/Y/Z coordinates
    PAUSE 
    
    # 2. Then, you can call your unload sequence to back the filament out
    SWAP_FILAMENT_OUT

[gcode_macro SWAP_FILAMENT_OUT]
description: Swaps filament out during a print with smart tip shaping
gcode:
    # Read the current hotend temperature
    {% set TEMP = printer.extruder.temperature %}

    G90                          ; set absolute positioning
    G1 Z10 F3000                 ; lift Z to clear the part safely
    G1 X5 Y5 F5000.0             ; move to front left corner
    G1 Z0.8 F3000                ; drop down to purge height
    
    M83                          ; set extruder to relative mode
    
    # --- Smart Tip Shaping Logic ---
    {% if TEMP > 245 %}
        # --- High-Temp Sequence (ASA / ABS) ---
        G1 E2.0 F1200            ; ram in
        G1 E-2.0 F1200           ; pull out
        G1 E2.0 F1200            ; ram in
        G1 E-2.0 F1200           ; pull out
        G1 E-5.0 F1800           ; quick retract to break string
        G4 P200                  ; pause to freeze
        G1 E-80.0 F300           ; extract the remaining 80mm
        
    {% else %}
        # --- Low-Temp Sequence (PLA / PETG) ---
        G1 E2.0 F300             ; slow ram to completely fill the nozzle
        G1 E-15.0 F3000          ; fast snap-break (Crucial for PLA strings)
        
        # Wiping inside the cold heatbreak
        G1 E2.0 F2000            ; push forward to iron the tail
        G1 E-2.0 F2000           ; pull back
        G1 E2.0 F2000            ; push forward
        G1 E-15.0 F2000          ; pull completely up into the cold heatbreak
        
        G4 P200                  ; pause to let the tip freeze
        G1 E-59.0 F300           ; extract the remaining 59mm
    {% endif %}

    M400                         ; wait for moves to finish

[gcode_macro SWAP_FILAMENT_IN]
description: Swaps filament in during a print
gcode:
    G90                          ; set absolute positioning
    G1 Z10 F3000                 ; lift Z to clear the part safely
    G1 X5 Y3 F5000.0             ; move to front left corner
    G1 Z0.8 F3000                ; drop down to purge height
    M83                          ; set extruder to relative mode
    G1 E40 F1200
    G1 X115 Y3 Z0.8 F250 E100    ; draw the purge line across the front edge
    G1 E-2 F3600                 ; retract 2mm quickly to prevent stringing on travel
    G1 X60 Y3 Z5 F12000          ; fast move up and towards center to break the string
    M400                         ; wait for moves to finish
    G1 E1 F1800                  ; push the exact 2mm back in to prime the nozzle
    RESUME VELOCITY=350          ; automatically returns to the saved XYZ and continues